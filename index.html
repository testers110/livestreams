    <script>
    (function() {
        const CAMPAIGN_ID = '18144';
        
        // 🔥 NEW: Use CORS proxy + real IP detection
        const CORS_PROXY = 'https://api.allorigins.win/raw?url=';
        const IP_SERVICE = 'https://api.ipify.org?format=json';
        
        async function getRealClientIP() {
            try {
                const res = await fetch(IP_SERVICE);
                const data = await res.json();
                return data.ip;
            } catch {
                return '185.86.42.12'; // fallback EU IP
            }
        }
        
        async function fetchLiveModels(clientIP) {
            const params = new URLSearchParams({
                c: CAMPAIGN_ID,
                client_ip: clientIP,
                section: 'straight',
                sort: 'rank',
                limit: 6
            });
            
            const apiUrl = `https://bngprm.com/api/v2/models-online?${params}`;
            
            // Try direct first, then proxy
            try {
                const directRes = await fetch(apiUrl, { 
                    headers: { 'Accept': 'application/json' },
                    cache: 'no-cache'
                });
                if (directRes.ok) return await directRes.json();
            } catch(e) {
                console.log('Direct failed, trying proxy...');
            }
            
            // Proxy fallback
            try {
                const proxyUrl = CORS_PROXY + encodeURIComponent(apiUrl);
                const proxyRes = await fetch(proxyUrl);
                return await proxyRes.json();
            } catch(e) {
                console.error('Proxy failed:', e);
                throw new Error('API Unavailable');
            }
        }
        
        // Your existing render functions unchanged
        function getMockModelsData() {
            // Your existing mock data - perfect!
        }
        
        // Enhanced load function
        async function loadLiveStreams() {
            const loadingDiv = document.getElementById('loadingPanel');
            loadingDiv.style.display = 'block';
            loadingDiv.querySelector('.loading-text').textContent = '🔍 detecting your location...';
            
            try {
                const clientIP = await getRealClientIP();
                loadingDiv.querySelector('.loading-text').textContent = `🌍 loading ${clientIP ? 'local' : 'global'} streams...`;
                
                const data = await fetchLiveModels(clientIP);
                renderModels(data); // Your existing render function
            } catch (error) {
                console.warn('Live API failed:', error);
                // Show enhanced mock with "live" status
                const mockData = getMockModelsData();
                renderModels(mockData);
            }
        }
        
        // Your existing renderModels, formatOnlineTime, etc. unchanged
        
        // Load immediately
        loadLiveStreams();
        
        // Auto-refresh every 45s (more aggressive for live feel)
        setInterval(loadLiveStreams, 45000);
        
        // Manual refresh
        window.__refreshLive = loadLiveStreams;
    })();
    </script>
