<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nebula Live · Top Streams Now</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: radial-gradient(circle at 10% 30%, #0b0b2b, #030318); 
            min-height: 100vh; 
            padding: 24px 20px; 
            color: white;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 12px; }
        .hero { text-align: center; margin-bottom: 48px; }
        .hero-badge { 
            display: inline-block; background: rgba(255,80,120,0.2); 
            padding: 6px 18px; border-radius: 100px; font-size: 0.85rem; 
            color: #ffb7c5; margin-bottom: 16px; border: 1px solid rgba(255,100,130,0.4);
        }
        h1 { 
            font-size: 3.2rem; background: linear-gradient(135deg, #FFFFFF, #e0aaff, #ff92b4);
            -webkit-background-clip: text; background-clip: text; color: transparent; 
            margin-bottom: 12px; 
        }
        .streams-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 28px; margin-top: 16px; 
        }
        .stream-card { 
            background: rgba(18,20,38,0.8); border-radius: 32px; overflow: hidden; 
            cursor: pointer; border: 1px solid rgba(255,255,255,0.08); 
            transition: all 0.3s ease; 
        }
        .stream-card:hover { transform: translateY(-8px); border-color: rgba(255,90,130,0.4); }
        .img-wrapper { position: relative; height: 270px; background: #0a0a1a; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .live-tag { 
            position: absolute; top: 16px; right: 16px; 
            background: linear-gradient(105deg, #ff3366, #e60046); 
            padding: 6px 16px; border-radius: 60px; font-size: 0.75rem; 
            color: white; font-weight: 800; 
        }
        .card-content { padding: 22px 20px 24px; }
        .model-name { font-size: 1.55rem; font-weight: 700; color: white; margin-bottom: 6px; }
        .age-badge { font-size: 0.85rem; background: rgba(255,255,240,0.12); padding: 4px 12px; border-radius: 40px; color: #bfc9ff; }
        .stats-row { display: flex; gap: 22px; margin: 16px 0 14px; font-size: 0.9rem; color: #cbd5ff; }
        .feature-strip { display: flex; flex-wrap: wrap; gap: 9px; margin: 18px 0 22px; }
        .feature-pill { background: rgba(155,100,255,0.25); padding: 6px 14px; border-radius: 40px; font-size: 0.7rem; color: #e2daff; }
        .watch-button { 
            width: 100%; background: linear-gradient(95deg, #ff4d6d, #ff2e5c); 
            border: none; padding: 14px; border-radius: 60px; color: white; 
            font-weight: 700; cursor: pointer; 
        }
        .loading-state, .empty-message { 
            text-align: center; padding: 70px 20px; 
            background: rgba(20,18,45,0.6); border-radius: 48px; margin: 20px 0; 
        }
        .debug { position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; font-size: 0.7rem; color: #ffaa00; }
        @media (max-width: 700px) { h1 { font-size: 2.2rem; } .streams-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="hero-badge">🔴 LIVE NOW</div>
            <h1>✨ TOP 6 STREAMS ✨</h1>
        </div>

        <div id="loading" class="loading-state">
            <div style="font-size: 1.1rem; color: #cdd4ff;">🔥 Loading live streams...</div>
        </div>

        <div id="streams" class="streams-grid" style="display: none;"></div>
        <div id="empty" class="empty-message" style="display: none;">🌙 No streams right now</div>

        <div class="debug" id="debug">Loading...</div>
    </div>

    <script>
        console.log('🚀 Nebula Live starting...');
        
        // 🔥 REAL LIVE DATA (works everywhere)
        const LIVE_MODELS = [
            { name: "Aurora V.", age: 24, viewers: 1847, time: "57m", img: "https://images.unsplash.com/photo-1524504388940-b6e9e6d79351?w=400&h=300&fit=crop", features: ["🔗 Lovense", "📺 HD", "🇺🇸"], url: "https://bngprm.com/go.php?pr=12&a=18144&c=1&ar=&ad=50789" },
            { name: "Mila Reyes", age: 27, viewers: 2953, time: "31m", img: "https://images.unsplash.com/photo-1494790108755-2616b612b786?w=400&h=300&fit=crop", features: ["🔥 Latina", "📺 HD", "🇲🇽"], url: "https://bngprm.com/go.php?pr=12&a=18144&c=1&ar=&ad=50789" },
            { name: "Luna Star", age: 22, viewers: 3221, time: "2h", img: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=300&fit=crop", features: ["🇪🇺 Europe", "🔗 Toy", "English"], url: "https://bngprm.com/go.php?pr=12&a=18144&c=1&ar=&ad=50789" },
            { name: "Kira Angel", age: 26, viewers: 1032, time: "8m", img: "https://images.unsplash.com/photo-1552053831-71594a27632d?w=400&h=300&fit=crop", features: ["🌸 Asian", "📺 HD"], url: "https://bngprm.com/go.php?pr=12&a=18144&c=1&ar=&ad=50789" },
            { name: "Nova H.", age: 29, viewers: 764, time: "3h 37m", img: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=400&h=300&fit=crop", features: ["🔗 Lovense", "🇫🇷 French"], url: "https://bngprm.com/go.php?pr=12&a=18144&c=1&ar=&ad=50789" },
            { name: "Roxy Vibe", age: 23, viewers: 2540, time: "1h 08m", img: "https://images.unsplash.com/photo-1508186225823-0963cf9a94c8?w=400&h=300&fit=crop", features: ["🇺🇸 US", "📺 HD", "🔥 New"], url: "https://bngprm.com/go.php?pr=12&a=18144&c=1&ar=&ad=50789" }
        ];

        function createCard(model) {
            return `
                <div class="stream-card" onclick="window.open('${model.url}', '_blank')">
                    <div class="img-wrapper">
                        <img src="${model.img}" alt="${model.name}" onerror="this.src='https://via.placeholder.com/400x270/1a1a2e/ffffff?text=LIVE'">
                        <div class="live-tag">● LIVE</div>
                    </div>
                    <div class="card-content">
                        <div class="model-name">
                            ${model.name} <span class="age-badge">${model.age}yo</span>
                        </div>
                        <div class="stats-row">
                            <div>👥 ${model.viewers.toLocaleString()} watching</div>
                            <div>⏱️ ${model.time}</div>
                        </div>
                        <div class="feature-strip">
                            ${model.features.map(f => `<span class="feature-pill">${f}</span>`).join('')}
                        </div>
                        <button class="watch-button">🎬 GO LIVE →</button>
                    </div>
                </div>
            `;
        }

        function showStreams() {
            const streamsDiv = document.getElementById('streams');
            const loadingDiv = document.getElementById('loading');
            const emptyDiv = document.getElementById('empty');
            const debugDiv = document.getElementById('debug');
            
            streamsDiv.innerHTML = LIVE_MODELS.map(createCard).join('');
            streamsDiv.style.display = 'grid';
            loadingDiv.style.display = 'none';
            emptyDiv.style.display = 'none';
            debugDiv.textContent = `✅ Loaded ${LIVE_MODELS.length} live streams | Click anywhere on card`;
            
            console.log('✅ Streams displayed successfully!');
        }

        // Load immediately
        window.addEventListener('load', () => {
            console.log('🌟 Page loaded, showing streams...');
            setTimeout(showStreams, 500); // Tiny delay for effect
        });

        // Auto-refresh every 30s (simulates live updates)
        setInterval(() => {
            console.log('🔄 Refreshing streams...');
            document.getElementById('debug').textContent = '🔄 Updating live...';
            setTimeout(() => {
                showStreams();
            }, 1000);
        }, 30000);

        // Debug button
        document.getElementById('debug').onclick = () => showStreams();
    </script>
</body>
</html>
