<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔴 Live Streams - Top 6 Now</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,serif;background:linear-gradient(135deg,#0a0a2e,#1a1a3e);min-height:100vh;padding:20px;color:#fff}
        .container{max-width:1200px;margin:0 auto}
        h1{font-size:3rem;text-align:center;background:linear-gradient(45deg,#ff6b9d,#c44569);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:40px 0 60px}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:30px}
        .card{background:rgba(255,255,255,0.1);backdrop-filter:blur(20px);border-radius:25px;padding:25px;text-align:center;cursor:pointer;transition:all 0.3s;border:1px solid rgba(255,255,255,0.2)}
        .card:hover{transform:translateY(-15px);box-shadow:0 25px 50px rgba(255,107,157,0.3)}
        .live-img{width:100%;height:250px;border-radius:20px;background:linear-gradient(45deg,#ff416c,#ff4b2b);display:flex;align-items:center;justify-content:center;font-size:2rem;color:rgba(255,255,255,0.8);margin-bottom:20px;position:relative;overflow:hidden}
        .live-img::before{content:"● LIVE";position:absolute;top:20px;right:20px;background:#ff4757;color:white;padding:8px 16px;border-radius:25px;font-weight:700;font-size:0.9rem;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
        .name{font-size:1.8rem;font-weight:700;margin-bottom:10px}
        .age,.stats{font-size:1.1rem;color:#ddd;margin:8px 0}
        .features{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:20px 0}
        .feature{background:rgba(255,107,157,0.3);padding:6px 15px;border-radius:20px;font-size:0.9rem}
        .btn{display:block;width:100%;background:linear-gradient(45deg,#ff6b9d,#ff416c);color:white;padding:18px;border:none;border-radius:50px;font-size:1.2rem;font-weight:700;cursor:pointer;margin-top:20px;transition:all 0.3s}
        .btn:hover{background:linear-gradient(45deg,#ff8fab,#ff5d8f);transform:scale(1.05)}
        .loading,.empty{text-align:center;padding:80px;background:rgba(255,255,255,0.05);border-radius:25px;margin:40px 0;font-size:1.3rem}
        @media(max-width:768px){h1{font-size:2rem}.grid{gap:20px}}
    </style>
</head>
<body>
    <div class="container">
        <h1>🔴 TOP 6 LIVE STREAMS</h1>
        
        <div id="content" class="loading">
            🔥 Loading hottest live cams...
        </div>
    </div>

    <script>
        const STREAMS = [
            {name:"Aurora V.",age:"24",viewers:"2.8K",time:"47min",features:["Lovense","HD","English"],url:"https://bngprm.com/go.php?pr=12&a=18144&c=1&ar=&ad=50789"},
            {name:"Mila Reyes",age:"27",viewers:"3.9K",time:"21min",features:["Latina","Squirt","Mobile"],url:"https://bngprm.com/go.php?pr=12&a=18144&c=1&ar=&ad=50789"},
            {name:"Luna Star",age:"22",viewers:"4.2K",time:"1h42m",features:["Europe","Top Rank","Interactive"],url:"https://bngprm.com/go.php?pr=12&a=18144&c=1&ar=&ad=50789"},
            {name:"Kira Angel",age:"26",viewers:"2K",time:"14min",features:["Asian","New","HD"],url:"https://bngprm.com/go.php?pr=12&a=18144&c=1&ar=&ad=50789"},
            {name:"Nova Heart",age:"29",viewers:"1.7K",time:"2h37m",features:["Lovense","French","VIP"],url:"https://bngprm.com/go.php?pr=12&a=18144&c=1&ar=&ad=50789"},
            {name:"Roxy Vibe",age:"23",viewers:"3.5K",time:"58min",features:["US","Music","Trending"],url:"https://bngprm.com/go.php?pr=12&a=18144&c=1&ar=&ad=50789"}
        ];

        function showStreams(){
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="grid">
                    ${STREAMS.map(stream => `
                        <div class="card" onclick="window.open('${stream.url}','_blank')">
                            <div class="live-img">📹 LIVE CAM</div>
                            <div class="name">${stream.name}</div>
                            <div class="age">${stream.age}yo</div>
                            <div class="stats">👥 ${stream.viewers} watching • ⏱️ ${stream.time}</div>
                            <div class="features">
                                ${stream.features.map(f => `<span class="feature">${f}</span>`).join('')}
                            </div>
                            <button class="btn" onclick="event.stopPropagation();window.open('${stream.url}','_blank')">🎬 ENTER CHAT →</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // LOAD IMMEDIATELY
        setTimeout(showStreams, 1000);
        
        // REFRESH EVERY 30s
        setInterval(showStreams, 30000);
    </script>
</body>
</html>
