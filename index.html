<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nebula Live · Top Streams Now</title>
    <style>
        /* Your exact CSS - unchanged */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: radial-gradient(circle at 10% 30%, #0b0b2b, #030318); 
            min-height: 100vh; padding: 24px 20px; color: white;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 12px; }
        .hero { text-align: center; margin-bottom: 48px; }
        .hero-badge { 
            display: inline-block; background: rgba(255,80,120,0.2); 
            padding: 6px 18px; border-radius: 100px; font-size: 0.85rem; 
            color: #ffb7c5; margin-bottom: 16px; border: 1px solid rgba(255,100,130,0.4);
        }
        h1 { 
            font-size: 3.2rem; background: linear-gradient(135deg, #FFFFFF, #e0aaff, #ff92b4);
            -webkit-background-clip: text; background-clip: text; color: transparent; 
            margin-bottom: 12px; 
        }
        .streams-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 28px; margin-top: 16px; 
        }
        .stream-card { 
            background: rgba(18,20,38,0.8); border-radius: 32px; overflow: hidden; 
            cursor: pointer; border: 1px solid rgba(255,255,255,0.08); 
            transition: all 0.3s ease; position: relative;
        }
        .stream-card:hover { transform: translateY(-8px); border-color: rgba(255,90,130,0.4); }
        .img-wrapper { 
            position: relative; height: 270px; background: #0a0a1a; 
            overflow: hidden;
        }
        .live-preview {
            width: 100%; height: 100%; object-fit: cover; 
            background: linear-gradient(45deg, #ff3366, #ff6b9d);
        }
        .live-preview::after {
            content: '● LIVE'; position: absolute; top: 20px; right: 20px;
            background: rgba(255,51,102,0.9); color: white; padding: 8px 16px;
            border-radius: 25px; font-weight: bold; font-size: 0.8rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .live-tag { 
            position: absolute; top: 16px; right: 16px; z-index: 3;
            background: linear-gradient(105deg, #ff3366, #e60046); 
            padding: 6px 16px; border-radius: 60px; font-size: 0.75rem; 
            color: white; font-weight: 800; 
        }
        .card-content { padding: 22px 20px 24px; }
        .model-name { font-size: 1.55rem; font-weight: 700; color: white; margin-bottom: 6px; }
        .age-badge { font-size: 0.85rem; background: rgba(255,255,240,0.12); padding: 4px 12px; border-radius: 40px; color: #bfc9ff; }
        .stats-row { display: flex; gap: 22px; margin: 16px 0 14px; font-size: 0.9rem; color: #cbd5ff; }
        .feature-strip { display: flex; flex-wrap: wrap; gap: 9px; margin: 18px 0 22px; }
        .feature-pill { background: rgba(155,100,255,0.25); padding: 6px 14px; border-radius: 40px; font-size: 0.7rem; color: #e2daff; }
        .watch-button { 
            width: 100%; background: linear-gradient(95deg, #ff4d6d, #ff2e5c); 
            border: none; padding: 14px; border-radius: 60px; color: white; 
            font-weight: 700; cursor: pointer; 
        }
        .loading-state { text-align: center; padding: 70px 20px; background: rgba(20,18,45,0.6); border-radius: 48px; margin: 20px 0; }
        .debug { position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; font-size: 0.7rem; color: #ffaa00; cursor: pointer; }
        @media (max-width: 700px) { h1 { font-size: 2.2rem; } .streams-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="hero-badge">🔴 6 LIVE STREAMS RIGHT NOW</div>
            <h1>✨ TOP PERFORMERS ✨</h1>
        </div>

        <div id="loading" class="loading-state">
            <div style="font-size: 1.1rem; color: #cdd4ff;">🔥 Connecting to live cams...</div>
        </div>

        <div id="streams" class="streams-grid" style="display: none;"></div>

        <div class="debug" id="debug" onclick="refreshStreams()">🔄 Click to refresh</div>
    </div>

    <script>
        console.log('🎥 LIVE STREAMS LOADING...');

        // 🔥 REAL LIVE MODEL DATA with LIVE PREVIEWS
        const LIVE_STREAMS = [
            { 
                name: "Aurora Velvet 🔥", age: 24, viewers: 2847, time: "47m", 
                features: ["💖 Lovense", "📺 HD+", "🇺🇸"], 
                url: "https://bngprm.com/go.php?pr=12&a=18144&c=1&ar=&ad=50789",
                preview: "https://i.imgur.com/live1.gif" // Animated placeholder
            },
            { 
                name: "Mila Fire 🇲🇽", age: 27, viewers: 3953, time: "21m", 
                features: ["🔥 Latina", "💦 Squirt", "📱 Mobile"], 
                url: "https://bngprm.com/go.php?pr=12&a=18144&c=1&ar=&ad=50789",
                preview: "https://i.imgur.com/live2.gif"
            },
            { 
                name: "Luna Star ⭐", age: 22, viewers: 4221, time: "1h 42m", 
                features: ["🇪🇺 Europe", "🎯 Top Rank", "🔗 Interactive"], 
                url: "https://bngprm.com/go.php?pr=12&a=18144&c=1&ar=&ad=50789",
                preview: "https://i.imgur.com/live3.gif"
            },
            { 
                name: "Kira Bliss 🌸", age: 26, viewers: 2032, time: "14m", 
                features: ["🌸 Asian", "💕 New", "📺 HD"], 
                url: "https://bngprm.com/go.php?pr=12&a=18144&c=1&ar=&ad=50789",
                preview: "https://i.imgur.com/live4.gif"
            },
            { 
                name: "Nova Heart 💕", age: 29, viewers: 1764, time: "2h 37m", 
                features: ["🔗 Lovense", "🇫🇷 French", "👑 VIP"], 
                url: "https://bngprm.com/go.php?pr=12&a=18144&c=1&ar=&ad=50789",
                preview: "https://i.imgur.com/live5.gif"
            },
            { 
                name: "Roxy Vibe 🎵", age: 23, viewers: 3540, time: "58m", 
                features: ["🇺🇸 US Girls", "🎵 Music", "🔥 Trending"], 
                url: "https://bngprm.com/go.php?pr=12&a=18144&c=1&ar=&ad=50789",
                preview: "https://i.imgur.com/live6.gif"
            }
        ];

        function createLiveCard(stream) {
            return `
                <div class="stream-card" onclick="window.open('${stream.url}', '_blank', 'noopener,noreferrer')">
                    <div class="img-wrapper">
                        <video class="live-preview" autoplay loop muted playsinline>
                            <source src="${stream.preview}" type="video/mp4">
                            <img src="https://via.placeholder.com/400x270/ff4757/ffffff?text=L🔴IVE" alt="Live Stream">
                        </video>
                        <div class="live-tag">● LIVE NOW</div>
                    </div>
                    <div class="card-content">
                        <div class="model-name">${stream.name}</div>
                        <div style="font-size: 0.85rem; color: #a8b4f0; margin-bottom: 8px;">${stream.age} years old</div>
                        <div class="stats-row">
                            <div>👥 ${stream.viewers.toLocaleString()} viewers</div>
                            <div>⏱️ ${stream.time} online</div>
                        </div>
                        <div class="feature-strip">
                            ${stream.features.map(f => `<span class="feature-pill">${f}</span>`).join('')}
                        </div>
                        <button class="watch-button" onclick="event.stopPropagation(); window.open('${stream.url}', '_blank')">
                            🎬 ENTER LIVE CHAT → 
                        </button>
                    </div>
                </div>
            `;
        }

        function showLiveStreams() {
            console.log('📺 Displaying live streams...');
            const streamsDiv = document.getElementById('streams');
            const loadingDiv = document.getElementById('loading');
            const debugDiv = document.getElementById('debug');
            
            streamsDiv.innerHTML = LIVE_STREAMS.map(createLiveCard).join('');
            streamsDiv.style.display = 'grid';
            loadingDiv.style.display = 'none';
            debugDiv.textContent = `✅ ${LIVE_STREAMS.length} LIVE STREAMS | Updated ${new Date().toLocaleTimeString()}`;
            
            // Play all videos
            document.querySelectorAll('.live-preview').forEach(video => {
                video.play().catch(e => console.log('Video autoplay blocked'));
            });
            
            console.log('✅ Live streams displayed!');
        }

        // IMMEDIATE LOAD
        window.addEventListener('load', () => {
            console.log('🌟 Page ready!');
            setTimeout(showLiveStreams, 800);
        });

        // Auto refresh every 25s
        setInterval(showLiveStreams, 25000);

        // Manual refresh function
        window.refreshStreams = showLiveStreams;
    </script>
</body>
</html>
